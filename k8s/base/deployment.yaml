apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-adaptive-router
  labels:
    app: llm-adaptive-router
spec:
  replicas: 1
  strategy:
    type: Recreate  # This kills the old pod first, freeing the GPU for the new one since GPU quota is 1.
  selector:
    matchLabels:
      app: llm-adaptive-router
  template:
    metadata:
      labels:
        app: llm-adaptive-router
    spec:
      # 1. SHARED STORAGE: Temporary folder for adapters
      volumes:
      - name: lora-storage
        emptyDir: {}

      # 2. DOWNLOADER: Pulls the adapter weights before vLLM starts
      initContainers:
      - name: lora-downloader
        image: python:3.9-slim
        env:
        - name: HF_TOKEN  # Standard variable name for HF library
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: hf_token
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e

            echo "=== [1/4] Python version ==="
            python --version

            echo "=== [2/4] Installing huggingface_hub ==="
            pip install huggingface_hub --quiet

            echo "=== [3/4] Checking HF token ==="
            if [ -z "$HF_TOKEN" ]; then
              echo "ERROR: HF_TOKEN is empty or not set!"
              exit 1
            else
              echo "HF_TOKEN is set (starts with: ${HF_TOKEN:0:8}...)"
            fi

            echo "=== [4/4] Downloading LoRA adapters ==="
            python -c "
            import os
            from huggingface_hub import snapshot_download

            token = os.environ.get('HF_TOKEN')
            adapters = [
                ('vindows/qwen2.5-7b-text-to-sql', '/data/sql-lora'),
                ('miarick/Qwen2.5-7B-Instruct-cyberpunk-literary-lora', '/data/creative-lora'),
            ]

            for repo_id, local_dir in adapters:
                print(f'Downloading {repo_id} -> {local_dir} ...')
                path = snapshot_download(repo_id=repo_id, local_dir=local_dir, token=token)
                total_files = sum(len(f) for _, _, f in os.walk(local_dir))
                print(f'Done: {total_files} files in {path}')
            "

            echo "=== DONE ==="
        volumeMounts:
        - name: lora-storage
          mountPath: /data

      containers:
      - name: vllm-engine
        image: vllm/vllm-openai:latest
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: hf_token
        args: [
          "--model", "Qwen/Qwen2.5-7B-Instruct",
          "--gpu-memory-utilization", "0.7", # Lowered to provide VRAM for adapters
          "--max-model-len", "3072",
          "--enable-lora", # Required for multi-adapter support
          "--lora-modules", "sql-expert=/data/sql-lora", "creative=/data/creative-lora",
          "--max-loras", "2",
          "--max-lora-rank", "16",
          "--enforce-eager"
        ]
        resources:
          limits:
            nvidia.com/gpu: 1
            cpu: "4"
            memory: "16Gi"
          requests:
            cpu: "4"
            memory: "16Gi"
            nvidia.com/gpu: 1
        volumeMounts:
        - name: lora-storage
          mountPath: /data
        ports:
        - containerPort: 8000
      
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "sku"
        operator: "Equal"
        value: "gpu"
        effect: "NoSchedule"