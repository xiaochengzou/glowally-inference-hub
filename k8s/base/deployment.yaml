apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  labels:
    app: vllm-server
spec:
  replicas: 1
  strategy:
    type: Recreate  # This kills the old pod first, freeing the GPU for the new one
  selector:
    matchLabels:
      app: vllm-server
  template:
    metadata:
      labels:
        app: vllm-server
    spec:
      # 1. SHARED STORAGE: Temporary folder for adapters
      volumes:
      - name: lora-storage
        emptyDir: {}

      # 2. DOWNLOADER: Pulls the adapter weights before vLLM starts
      initContainers:
      - name: lora-downloader
        image: python:3.9-slim
        env:
        - name: HF_TOKEN  # Standard variable name for HF library
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: hf_token
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e

            echo "=== [1/4] Python version ==="
            python --version

            echo "=== [2/4] Installing huggingface_hub ==="
            pip install huggingface_hub --quiet

            echo "=== [3/4] Checking HF token ==="
            if [ -z "$HF_TOKEN" ]; then
              echo "ERROR: HF_TOKEN is empty or not set!"
              exit 1
            else
              echo "HF_TOKEN is set (starts with: ${HF_TOKEN:0:8}...)"
            fi

            echo "=== [4/4] Downloading LoRA adapter ==="
            python -c "
            import os
            from huggingface_hub import snapshot_download

            print('Authenticating with HF token...')
            token = os.environ.get('HF_TOKEN')

            print('Starting download of vindows/qwen2.5-7b-text-to-sql...')
            path = snapshot_download(
                repo_id='vindows/qwen2.5-7b-text-to-sql',
                local_dir='/data/sql-lora',
                token=token
            )
            print(f'Download complete. Files saved to: {path}')

            files = list(os.walk('/data/sql-lora'))
            print(f'Total directories: {len(files)}')
            total_files = sum(len(f) for _, _, f in files)
            print(f'Total files: {total_files}')
            "

            echo "=== DONE ==="
        volumeMounts:
        - name: lora-storage
          mountPath: /data

      containers:
      - name: vllm-engine
        image: vllm/vllm-openai:latest
        args: [
          "--model", "Qwen/Qwen2.5-7B-Instruct",
          "--gpu-memory-utilization", "0.7", # Lowered to provide VRAM for adapters
          "--max-model-len", "4096",
          "--enable-lora", # Required for multi-adapter support
          "--lora-modules", "sql-expert=/data/sql-lora", # Maps friendly name to path
          "--max-loras", "1",
          "--max-lora-rank", "16",
          "--enforce-eager"
        ]
        resources:
          limits:
            nvidia.com/gpu: 1
            cpu: "4"
            memory: "16Gi"
          requests:
            cpu: "4"
            memory: "16Gi"
            nvidia.com/gpu: 1
        volumeMounts:
        - name: lora-storage
          mountPath: /data
        ports:
        - containerPort: 8000
      
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "sku"
        operator: "Equal"
        value: "gpu"
        effect: "NoSchedule"